name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # --- Test phase (added in context/changes/testing-bootstrap-critical-path) ---
      # See context/foundation/test-plan.md §5: required gate after §3 Phase 1.

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start
        # Applies all migrations in supabase/migrations/.
        # Cold-pull takes 60-90s on a fresh runner.

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration
        # globalSetup reads `supabase status` for URL/keys, reuses the build
        # from the earlier step, then boots `wrangler dev` for the test run.

      - name: DB-layer pgTAP regression
        run: supabase test db
        # Runs supabase/tests/rls_isolation.test.sql. Last so it owns the DB
        # state during its assertions.

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
