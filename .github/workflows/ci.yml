name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # --- Test phase (added in context/changes/testing-bootstrap-critical-path) ---
      # See context/foundation/test-plan.md §5: required gate after §3 Phase 1.
      # All `supabase` invocations go through `npx` so the version comes from
      # the npm devDep — single source of truth, no version skew.

      - name: Start local Supabase stack
        run: npx supabase start
        # Applies all migrations in supabase/migrations/.
        # Cold-pull takes 60-90s on a fresh runner.

      - name: Unit tests
        run: npm test

      - name: Integration tests
        if: ${{ !cancelled() }}
        # Run even if unit tests failed — parallel signal beats fail-fast
        # while this suite is young; we want to learn flake patterns early.
        # globalSetup reads `supabase status` for URL/keys, reuses the build
        # from the earlier step, then boots `wrangler dev` for the test run.
        run: npm run test:integration

      # --- E2E (Playwright) — added in context/changes/e2e-rls-and-auth-smoke ---
      # See context/foundation/test-plan.md §3 Phase 4 + §5. Runs after the
      # integration suite (same wrangler-dev infra reused via playwright.config.ts
      # webServer). Initially continue-on-error: true; flip to required after
      # 2 green runs (test-plan §5).
      #
      # Zero-secrets design: SUPABASE_URL / SUPABASE_KEY / SUPABASE_SERVICE_ROLE_KEY
      # are captured from the live local Supabase stack via `supabase status -o env`
      # (well-known dev keys, stable per Supabase CLI version — not real secrets).
      # E2E_TEST_EMAIL / E2E_TEST_PASSWORD are generated per-run and the seed
      # script auto-creates the account on first use.

      - name: Capture Supabase env + generate disposable E2E credentials
        if: ${{ !cancelled() }}
        # `supabase status -o env` prints `API_URL=…\nANON_KEY=…\nSERVICE_ROLE_KEY=…`.
        # Map them to the names our scripts expect and append to $GITHUB_ENV
        # so later steps see them. Disposable creds get a fresh UUID password
        # each run; the seed script creates the account if missing.
        run: |
          set -euo pipefail
          eval "$(npx supabase status -o env)"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "E2E_TEST_EMAIL=e2e-ci-${GITHUB_RUN_ID}@example.com"
            echo "E2E_TEST_PASSWORD=$(uuidgen)"
          } >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        if: ${{ !cancelled() }}
        run: npx playwright install --with-deps chromium

      - name: Seed primary E2E account
        if: ${{ !cancelled() }}
        run: npm run seed:e2e

      - name: E2E tests
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: DB-layer pgTAP regression
        if: ${{ !cancelled() }}
        # Runs supabase/tests/rls_isolation.test.sql. Last so it owns the DB
        # state during its assertions.
        run: npx supabase test db

      - name: Capture Supabase logs on failure
        if: failure()
        # Dumps service logs into a file the next step uploads. Lets us
        # post-mortem CI failures without re-running locally.
        run: |
          mkdir -p ci-logs
          npx supabase logs api  > ci-logs/supabase-api.log  2>&1 || true
          npx supabase logs auth > ci-logs/supabase-auth.log 2>&1 || true
          npx supabase logs db   > ci-logs/supabase-db.log   2>&1 || true

      - name: Upload CI logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: ci-logs/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --no-backup

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
